version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations/"
    queries: "sqlc/queries/"
    gen:
      go:
        package: "dbgen"
        out: "internal/repository/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
